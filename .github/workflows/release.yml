name: Signed agent release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing SemVer tag to publish (for example v0.1.3)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: signed-agent-release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  GH_CLI_LINUX_AMD64_SHA256: 83d5c2ccad5498f58bf6368acb1ab32588cf43ab3a4b1c301bf36328b1c8bd60
  GH_CLI_VERSION: "2.96.0"
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  prepare:
    name: Validate release identity
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      version: ${{ steps.identity.outputs.version }}
      protocol_version: ${{ steps.identity.outputs.protocol_version }}
      source_commit: ${{ steps.identity.outputs.source_commit }}
      prerelease: ${{ steps.identity.outputs.prerelease }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.tag }}

      - name: Fail fast unless the pinned GitHub CLI supports release policy
        shell: bash
        run: |
          set -euo pipefail
          archive="gh_${GH_CLI_VERSION}_linux_amd64.tar.gz"
          path="$RUNNER_TEMP/$archive"
          curl --fail --location --proto '=https' --proto-redir '=https' --tlsv1.2 \
            --retry 3 --retry-all-errors \
            "https://github.com/cli/cli/releases/download/v$GH_CLI_VERSION/$archive" \
            --output "$path"
          printf '%s  %s\n' "$GH_CLI_LINUX_AMD64_SHA256" "$path" \
            | sha256sum --check --strict
          tar -xzf "$path" -C "$RUNNER_TEMP"
          gh_bin="$RUNNER_TEMP/gh_${GH_CLI_VERSION}_linux_amd64/bin/gh"
          [[ "$($gh_bin version | sed -nE '1s/^gh version ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p')" == "$GH_CLI_VERSION" ]]
          "$gh_bin" release verify --help >/dev/null
          release_view_help="$("$gh_bin" release view --help)"
          for field in databaseId isImmutable; do
            grep -F -- "$field" <<< "$release_view_help" >/dev/null
          done
          help="$("$gh_bin" attestation verify --help)"
          for flag in --deny-self-hosted-runners --signer-digest --source-digest --source-ref; do
            grep -F -- "$flag" <<< "$help" >/dev/null
          done

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Validate tag, package version, protocol, and commit
        id: identity
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          WORKFLOW_COMMIT: ${{ github.sha }}
          WORKFLOW_REF: ${{ github.ref }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9A-Za-z][0-9A-Za-z.+-]*$ ]]; then
            echo "release tag must use a safe v-prefixed SemVer spelling" >&2
            exit 1
          fi
          if [[ "$WORKFLOW_REF" != "refs/tags/$RELEASE_TAG" ]]; then
            echo "dispatch this workflow from the same tag supplied as its input" >&2
            exit 1
          fi
          if ! git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "release tag does not exist: $RELEASE_TAG" >&2
            exit 1
          fi

          source_commit="$(git rev-parse HEAD)"
          tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
          if [[ "$source_commit" != "$tag_commit" || ! "$source_commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo "checked-out commit is not the exact 40-character commit for $RELEASE_TAG" >&2
            exit 1
          fi
          if [[ "$source_commit" != "$WORKFLOW_COMMIT" ]]; then
            echo "dispatch this workflow from $RELEASE_TAG so provenance identifies the release commit" >&2
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          package_version="$({
            cargo metadata --locked --no-deps --format-version 1 |
              jq -er '[.packages[] | select(.name == "nrm-agent") | .version] |
                if length == 1 then .[0] else error("expected exactly one nrm-agent package") end'
          })"
          if [[ "$package_version" != "$version" ]]; then
            echo "tag version $version does not match nrm-agent package version $package_version" >&2
            exit 1
          fi
          version_without_build="${version%%+*}"
          prerelease=false
          if [[ "$version_without_build" == *-* ]]; then
            prerelease=true
          fi

          mapfile -t protocol_versions < <(
            sed -nE 's/^pub const PROTOCOL_VERSION: u16 = ([0-9]+);$/\1/p' \
              crates/nrm-protocol/src/lib.rs
          )
          if [[ "${#protocol_versions[@]}" -ne 1 ]]; then
            echo "could not identify exactly one nrm-protocol PROTOCOL_VERSION" >&2
            exit 1
          fi
          protocol_version="${protocol_versions[0]}"

          {
            echo "version=$version"
            echo "protocol_version=$protocol_version"
            echo "source_commit=$source_commit"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

  linux:
    name: Linux ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write # Mint the Sigstore certificate for build provenance.
      attestations: write # Persist the native binary attestation.
      artifact-metadata: write # Record the attested binary in GitHub's artifact metadata store.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            runner_arch: x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            runner_arch: aarch64
    env:
      TARGET: ${{ matrix.target }}
      EXPECTED_RUNNER_ARCH: ${{ matrix.runner_arch }}
      VERSION: ${{ needs.prepare.outputs.version }}
      SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ needs.prepare.outputs.source_commit }}

      - name: Require native runner architecture
        shell: bash
        run: |
          set -euo pipefail
          actual="$(uname -m)"
          if [[ "$actual" != "$EXPECTED_RUNNER_ARCH" ]]; then
            echo "runner architecture $actual does not match $EXPECTED_RUNNER_ARCH" >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$SOURCE_COMMIT" ]]; then
            echo "checkout does not match the prepared source commit" >&2
            exit 1
          fi

      - name: Install musl and pinned Rust target
        shell: bash
        run: |
          set -euo pipefail
          sudo sed -i \
            's|http://ports.ubuntu.com/ubuntu-ports|https://ports.ubuntu.com/ubuntu-ports|g' \
            /etc/apt/sources.list.d/ubuntu.sources
          if grep -F 'http://ports.ubuntu.com/ubuntu-ports' /etc/apt/sources.list.d/ubuntu.sources; then
            echo "Ubuntu ports source was not upgraded to HTTPS" >&2
            exit 1
          fi
          sudo apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true update
          sudo apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true install -y musl-tools
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target "$TARGET"
          rustup default "$RUST_TOOLCHAIN"
          rustc -vV

      - name: Run native target tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p nrm-protocol -p nrm-agent --locked --target "$TARGET"
          cargo test -p nrm-sidecar --locked --target "$TARGET" -- --test-threads=1

      - name: Build, execute, and validate static agent
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p nrm-agent --release --locked --target "$TARGET"
          binary="target/$TARGET/release/nrm-agent"
          actual_version="$("$binary" --version)"
          if [[ "$actual_version" != "nrm-agent $VERSION" ]]; then
            echo "unexpected agent version: $actual_version" >&2
            exit 1
          fi
          if readelf -l "$binary" | grep -q 'INTERP'; then
            echo "$TARGET artifact contains a dynamic program interpreter" >&2
            exit 1
          fi
          mkdir -p dist
          install -m 0755 "$binary" "dist/nrm-agent-$VERSION-$TARGET"

      - name: Attest native agent provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/nrm-agent-${{ env.VERSION }}-${{ env.TARGET }}

      - name: Upload native agent
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: agent-${{ matrix.target }}
          path: dist/nrm-agent-${{ env.VERSION }}-${{ env.TARGET }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: true

  macos:
    name: macOS ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write # Mint the Sigstore certificate for build provenance.
      attestations: write # Persist the native binary attestation.
      artifact-metadata: write # Record the attested binary in GitHub's artifact metadata store.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            runner_arch: x86_64
          - runner: macos-15
            target: aarch64-apple-darwin
            runner_arch: arm64
    env:
      TARGET: ${{ matrix.target }}
      EXPECTED_RUNNER_ARCH: ${{ matrix.runner_arch }}
      VERSION: ${{ needs.prepare.outputs.version }}
      SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ needs.prepare.outputs.source_commit }}

      - name: Require native runner architecture
        shell: bash
        run: |
          set -euo pipefail
          actual="$(uname -m)"
          if [[ "$actual" != "$EXPECTED_RUNNER_ARCH" ]]; then
            echo "runner architecture $actual does not match $EXPECTED_RUNNER_ARCH" >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$SOURCE_COMMIT" ]]; then
            echo "checkout does not match the prepared source commit" >&2
            exit 1
          fi

      - name: Install pinned Rust target
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target "$TARGET"
          rustup default "$RUST_TOOLCHAIN"
          rustc -vV

      - name: Run native target tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p nrm-protocol -p nrm-agent --locked --target "$TARGET"
          cargo test -p nrm-sidecar --locked --target "$TARGET" -- --test-threads=1

      - name: Build and execute native agent
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p nrm-agent --release --locked --target "$TARGET"
          binary="target/$TARGET/release/nrm-agent"
          actual_version="$("$binary" --version)"
          if [[ "$actual_version" != "nrm-agent $VERSION" ]]; then
            echo "unexpected agent version: $actual_version" >&2
            exit 1
          fi
          mkdir -p dist
          install -m 0755 "$binary" "dist/nrm-agent-$VERSION-$TARGET"

      - name: Attest native agent provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/nrm-agent-${{ env.VERSION }}-${{ env.TARGET }}

      - name: Upload native agent
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: agent-${{ matrix.target }}
          path: dist/nrm-agent-${{ env.VERSION }}-${{ env.TARGET }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: true

  windows:
    name: Windows ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write # Mint the Sigstore certificate for build provenance.
      attestations: write # Persist the native binary attestation.
      artifact-metadata: write # Record the attested binary in GitHub's artifact metadata store.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            runner_arch: X64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            runner_arch: Arm64
    env:
      TARGET: ${{ matrix.target }}
      EXPECTED_RUNNER_ARCH: ${{ matrix.runner_arch }}
      VERSION: ${{ needs.prepare.outputs.version }}
      SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ needs.prepare.outputs.source_commit }}

      - name: Require native runner architecture
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $actual = [System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture.ToString()
          if ($actual -cne $env:EXPECTED_RUNNER_ARCH) {
            throw "runner architecture $actual does not match $env:EXPECTED_RUNNER_ARCH"
          }
          $actualCommit = ((git rev-parse HEAD) -join "`n").Trim()
          if ($LASTEXITCODE -ne 0 -or $actualCommit -cne $env:SOURCE_COMMIT) {
            throw "checkout does not match the prepared source commit"
          }

      - name: Install pinned Rust target
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          rustup toolchain install $env:RUST_TOOLCHAIN --profile minimal --target $env:TARGET
          rustup default $env:RUST_TOOLCHAIN
          rustc -vV

      - name: Run native target tests
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          cargo test -p nrm-protocol -p nrm-agent --locked --target $env:TARGET
          cargo test -p nrm-sidecar --locked --target $env:TARGET -- --test-threads=1

      - name: Build and execute native agent
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          cargo build -p nrm-agent --release --locked --target $env:TARGET
          $binary = "target/$env:TARGET/release/nrm-agent.exe"
          $actualVersion = ((& $binary --version) -join "`n").Trim()
          if ($LASTEXITCODE -ne 0 -or $actualVersion -cne "nrm-agent $env:VERSION") {
            throw "unexpected agent version: $actualVersion"
          }
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item -LiteralPath $binary -Destination "dist/nrm-agent-$env:VERSION-$env:TARGET.exe"

      - name: Attest native agent provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/nrm-agent-${{ env.VERSION }}-${{ env.TARGET }}.exe

      - name: Upload native agent
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: agent-${{ matrix.target }}
          path: dist/nrm-agent-${{ env.VERSION }}-${{ env.TARGET }}.exe
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: true

  sign:
    name: Sign verified release candidate
    needs: [prepare, linux, macos, windows]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: release
    permissions:
      contents: read
      attestations: read # Verify every native binary before exposing signing material.
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
      PROTOCOL_VERSION: ${{ needs.prepare.outputs.protocol_version }}
      SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
      SOURCE_REF: refs/tags/${{ inputs.tag }}
    steps:
      # This job intentionally has no checkout, Cargo invocation, repository
      # script, or other executable produced by the release tag. Keep the
      # signing seed confined to the small, reviewable step below.
      - name: Install the checksum-pinned GitHub CLI
        shell: bash
        run: |
          set -euo pipefail
          archive="gh_${GH_CLI_VERSION}_linux_amd64.tar.gz"
          path="$RUNNER_TEMP/$archive"
          curl --fail --location --proto '=https' --proto-redir '=https' --tlsv1.2 \
            --retry 3 --retry-all-errors \
            "https://github.com/cli/cli/releases/download/v$GH_CLI_VERSION/$archive" \
            --output "$path"
          printf '%s  %s\n' "$GH_CLI_LINUX_AMD64_SHA256" "$path" \
            | sha256sum --check --strict
          tar -xzf "$path" -C "$RUNNER_TEMP"
          gh_dir="$RUNNER_TEMP/gh_${GH_CLI_VERSION}_linux_amd64/bin"
          [[ "$("$gh_dir/gh" version | sed -nE '1s/^gh version ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p')" == "$GH_CLI_VERSION" ]]
          echo "$gh_dir" >> "$GITHUB_PATH"

      - name: Require repository release immutability
        env:
          GH_TOKEN: ${{ secrets.NRM_RELEASE_POLICY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "the release environment is missing NRM_RELEASE_POLICY_TOKEN" >&2
            exit 1
          fi
          policy="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/immutable-releases")"
          jq -e '.enabled == true' <<< "$policy" >/dev/null

      - name: Download all native agents
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: agent-*
          path: release-input
          merge-multiple: true

      - name: Require exactly six native agents and verify provenance
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          artifacts=(
            "nrm-agent-$VERSION-aarch64-apple-darwin"
            "nrm-agent-$VERSION-aarch64-pc-windows-msvc.exe"
            "nrm-agent-$VERSION-aarch64-unknown-linux-musl"
            "nrm-agent-$VERSION-x86_64-apple-darwin"
            "nrm-agent-$VERSION-x86_64-pc-windows-msvc.exe"
            "nrm-agent-$VERSION-x86_64-unknown-linux-musl"
          )
          printf '%s\n' "${artifacts[@]}" | LC_ALL=C sort > expected-artifacts.txt
          find release-input -mindepth 1 -maxdepth 1 -printf '%f\n' \
            | LC_ALL=C sort > actual-artifacts.txt
          diff -u expected-artifacts.txt actual-artifacts.txt
          for artifact in "${artifacts[@]}"; do
            path="release-input/$artifact"
            if [[ ! -f "$path" || -L "$path" ]]; then
              echo "missing regular native artifact: $artifact" >&2
              exit 1
            fi
            gh attestation verify "$path" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --signer-digest "$SOURCE_COMMIT" \
              --source-digest "$SOURCE_COMMIT" \
              --source-ref "refs/tags/$RELEASE_TAG" \
              --deny-self-hosted-runners
          done

      - name: Assemble and sign without executing release-tag code
        env:
          NRM_REGISTRY_SIGNING_KEYS_JSON: ${{ secrets.NRM_REGISTRY_SIGNING_KEYS_JSON }}
          NRM_REGISTRY_TRUSTED_PUBLIC_KEYS_JSON: ${{ vars.NRM_REGISTRY_TRUSTED_PUBLIC_KEYS_JSON }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          if [[ -z "${NRM_REGISTRY_SIGNING_KEYS_JSON:-}" ]]; then
            echo "the release environment is missing NRM_REGISTRY_SIGNING_KEYS_JSON" >&2
            exit 1
          fi
          if [[ -z "${NRM_REGISTRY_TRUSTED_PUBLIC_KEYS_JSON:-}" ]]; then
            echo "the release environment is missing NRM_REGISTRY_TRUSTED_PUBLIC_KEYS_JSON" >&2
            exit 1
          fi

          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import os
          from pathlib import Path
          import re
          import subprocess
          import tempfile

          MAX_ARTIFACT_BYTES = 128 * 1024 * 1024
          MAX_KEYS = 32
          PRIVATE_KEY_PREFIX = bytes.fromhex("302e020100300506032b657004220420")
          PUBLIC_KEY_PREFIX = bytes.fromhex("302a300506032b6570032100")
          TARGETS = (
              "aarch64-apple-darwin",
              "aarch64-pc-windows-msvc",
              "aarch64-unknown-linux-musl",
              "x86_64-apple-darwin",
              "x86_64-pc-windows-msvc",
              "x86_64-unknown-linux-musl",
          )

          def strict_map(name):
              raw = os.environ[name]
              if len(raw.encode()) > 64 * 1024:
                  raise SystemExit(f"{name} exceeds 64 KiB")
              def pairs_hook(pairs):
                  result = {}
                  for key, value in pairs:
                      if key in result:
                          raise ValueError("duplicate key ID")
                      result[key] = value
                  return result
              try:
                  value = json.loads(raw, object_pairs_hook=pairs_hook)
              except (TypeError, ValueError, json.JSONDecodeError) as error:
                  raise SystemExit(f"{name} is not strict JSON: {error}") from None
              if not isinstance(value, dict) or not 1 <= len(value) <= MAX_KEYS:
                  raise SystemExit(f"{name} must contain between 1 and {MAX_KEYS} keys")
              for key_id, encoded in value.items():
                  if not isinstance(encoded, str) or not re.fullmatch(r"[A-Za-z0-9._-]{1,128}", key_id):
                      raise SystemExit(f"{name} contains an invalid key entry")
              return value

          def canonical_base64(key_id, encoded, size, kind):
              try:
                  decoded = base64.b64decode(encoded, validate=True)
              except ValueError:
                  raise SystemExit(f"{kind} for {key_id!r} is not canonical base64") from None
              if len(decoded) != size or base64.b64encode(decoded).decode() != encoded:
                  raise SystemExit(f"{kind} for {key_id!r} is not canonical base64")
              return decoded

          def bounded_slice(data, offset, size, kind):
              end = offset + size
              if offset < 0 or end < offset or end > len(data):
                  raise SystemExit(f"artifact has a truncated or out-of-bounds {kind}")
              return data[offset:end]

          def little(data, offset, size, kind):
              return int.from_bytes(bounded_slice(data, offset, size, kind), "little")

          def validate_elf(data, target):
              header = bounded_slice(data, 0, 64, "ELF header")
              if header[:4] != b"\x7fELF" or header[4] != 2 or header[5] != 1:
                  raise SystemExit("Linux artifact is not a little-endian ELF64 executable")
              if header[6] != 1 or little(header, 20, 4, "ELF version") != 1:
                  raise SystemExit("Linux artifact has an invalid ELF version")
              if little(header, 16, 2, "ELF type") not in (2, 3):
                  raise SystemExit("Linux artifact is not an executable image")
              expected_machine = 183 if target.startswith("aarch64") else 62
              if little(header, 18, 2, "ELF machine") != expected_machine:
                  raise SystemExit(f"Linux artifact machine does not match {target}")
              if little(header, 52, 2, "ELF header size") != 64:
                  raise SystemExit("Linux artifact has a noncanonical ELF header size")
              program_offset = little(header, 32, 8, "ELF program offset")
              program_size = little(header, 54, 2, "ELF program entry size")
              program_count = little(header, 56, 2, "ELF program count")
              if (program_count == 0 or program_offset < 64 or program_offset % 8 != 0
                      or program_size != 56
                      or program_offset + program_size * program_count > len(data)):
                  raise SystemExit("Linux artifact has an invalid ELF program-header table")
              for index in range(program_count):
                  offset = program_offset + index * program_size
                  if little(data, offset, 4, "ELF program header") == 3:
                      raise SystemExit("Linux artifact contains a dynamic program interpreter")

          def validate_mach_o(data, target):
              header = bounded_slice(data, 0, 32, "Mach-O header")
              magic = header[:4]
              if magic in (b"\xca\xfe\xba\xbe", b"\xbe\xba\xfe\xca",
                           b"\xca\xfe\xba\xbf", b"\xbf\xba\xfe\xca"):
                  raise SystemExit("fat/universal Mach-O artifacts are not allowed")
              if magic != b"\xcf\xfa\xed\xfe":
                  raise SystemExit("macOS artifact is not a thin little-endian Mach-O 64 executable")
              expected_cpu = 0x0100000C if target.startswith("aarch64") else 0x01000007
              if little(header, 4, 4, "Mach-O CPU") != expected_cpu:
                  raise SystemExit(f"Mach-O CPU does not match {target}")
              if little(header, 12, 4, "Mach-O file type") != 2:
                  raise SystemExit("Mach-O artifact is not MH_EXECUTE")
              command_count = little(header, 16, 4, "Mach-O command count")
              command_bytes = little(header, 20, 4, "Mach-O command bytes")
              commands_end = 32 + command_bytes
              if command_count == 0 or command_count > 65535 or commands_end > len(data):
                  raise SystemExit("Mach-O artifact has an invalid load-command table")
              command_offset = 32
              for _ in range(command_count):
                  command_size = little(data, command_offset + 4, 4, "Mach-O load command")
                  next_offset = command_offset + command_size
                  if command_size < 8 or command_size % 8 != 0 or next_offset > commands_end:
                      raise SystemExit("Mach-O artifact has an invalid load command")
                  command_offset = next_offset
              if command_offset != commands_end:
                  raise SystemExit("Mach-O load-command count and byte size disagree")

          def validate_pe(data, target):
              dos = bounded_slice(data, 0, 64, "DOS header")
              if dos[:2] != b"MZ":
                  raise SystemExit("Windows artifact is missing its MZ header")
              pe_offset = little(dos, 60, 4, "PE offset")
              if pe_offset < 64:
                  raise SystemExit("PE header offset overlaps the DOS header")
              prefix = bounded_slice(data, pe_offset, 24, "PE signature and COFF header")
              if prefix[:4] != b"PE\0\0":
                  raise SystemExit("Windows artifact has an invalid PE signature")
              expected_machine = 0xAA64 if target.startswith("aarch64") else 0x8664
              if little(prefix, 4, 2, "PE machine") != expected_machine:
                  raise SystemExit(f"PE machine does not match {target}")
              section_count = little(prefix, 6, 2, "PE section count")
              if not 1 <= section_count <= 96:
                  raise SystemExit("PE artifact has an invalid section count")
              optional_size = little(prefix, 20, 2, "PE optional size")
              characteristics = little(prefix, 22, 2, "PE characteristics")
              if optional_size < 112 or characteristics & 2 == 0:
                  raise SystemExit("PE artifact is not a PE32+ executable image")
              optional_offset = pe_offset + 24
              if little(data, optional_offset, 2, "PE optional header") != 0x020B:
                  raise SystemExit("PE artifact is not PE32+")
              if optional_offset + optional_size + section_count * 40 > len(data):
                  raise SystemExit("PE artifact has an out-of-bounds header table")

          def validate_executable(data, target):
              if target.endswith("linux-musl"):
                  validate_elf(data, target)
              elif target.endswith("apple-darwin"):
                  validate_mach_o(data, target)
              else:
                  validate_pe(data, target)

          version = os.environ["VERSION"]
          protocol_text = os.environ["PROTOCOL_VERSION"]
          source_commit = os.environ["SOURCE_COMMIT"]
          if not re.fullmatch(r"[0-9A-Za-z][0-9A-Za-z.+-]{0,127}", version):
              raise SystemExit("release version has an unsafe spelling")
          if os.environ["RELEASE_TAG"] != f"v{version}" or os.environ["SOURCE_REF"] != f"refs/tags/v{version}":
              raise SystemExit("release tag, source ref, and package version disagree")
          if not re.fullmatch(r"[0-9a-f]{40}", source_commit):
              raise SystemExit("source commit is not an exact 40-character Git ID")
          if not protocol_text.isascii() or not protocol_text.isdigit():
              raise SystemExit("protocol version is not an unsigned integer")
          protocol_version = int(protocol_text)
          if not 0 <= protocol_version <= 0xFFFFFFFF:
              raise SystemExit("protocol version exceeds u32")

          source = Path("release-input")
          output = Path("release-candidate")
          assets = output / "release-assets"
          assets.mkdir(parents=True)
          expected = []
          artifact_records = []
          digests = set()
          for target in TARGETS:
              extension = ".exe" if target.endswith("windows-msvc") else ""
              filename = f"nrm-agent-{version}-{target}{extension}"
              expected.append(filename)
              path = source / filename
              if path.is_symlink() or not path.is_file():
                  raise SystemExit(f"missing regular artifact {filename!r}")
              size = path.stat().st_size
              if not 1 <= size <= MAX_ARTIFACT_BYTES:
                  raise SystemExit(f"artifact {filename!r} has an invalid size")
              artifact_bytes = path.read_bytes()
              if len(artifact_bytes) != size:
                  raise SystemExit(f"artifact {filename!r} changed while it was read")
              validate_executable(artifact_bytes, target)
              digest = hashlib.sha256(artifact_bytes).hexdigest()
              if digest in digests:
                  raise SystemExit("release targets contain duplicate artifact digests")
              digests.add(digest)
              artifact_records.append({
                  "target": target,
                  "filename": filename,
                  "sha256": digest,
                  "size": size,
              })
              (assets / filename).write_bytes(artifact_bytes)
          if sorted(path.name for path in source.iterdir()) != sorted(expected):
              raise SystemExit("release input contains a missing or unexpected entry")

          manifest = {
              "schema_version": 1,
              "package": "nrm-agent",
              "version": version,
              "protocol_version": protocol_version,
              "source_commit": source_commit,
              "artifacts": artifact_records,
          }
          manifest_path = assets / "nrm-agent-manifest-v1.json"
          manifest_path.write_bytes(
              json.dumps(manifest, ensure_ascii=False, separators=(",", ":")).encode() + b"\n"
          )

          signing = strict_map("NRM_REGISTRY_SIGNING_KEYS_JSON")
          trusted = strict_map("NRM_REGISTRY_TRUSTED_PUBLIC_KEYS_JSON")
          if set(signing) != set(trusted):
              raise SystemExit("signing and trusted public key ID sets differ")
          seeds = {}
          trusted_bytes = {}
          for key_id in sorted(signing):
              seeds[key_id] = canonical_base64(key_id, signing[key_id], 32, "Ed25519 seed")
              trusted_bytes[key_id] = canonical_base64(
                  key_id, trusted[key_id], 32, "Ed25519 public key"
              )
          if len(set(seeds.values())) != len(seeds) or len(set(trusted_bytes.values())) != len(trusted_bytes):
              raise SystemExit("signing configuration repeats key material")

          signatures = []
          with tempfile.TemporaryDirectory(prefix="nrm-sign-") as temporary:
              temporary = Path(temporary)
              for index, key_id in enumerate(sorted(signing)):
                  key_path = temporary / f"key-{index}.der"
                  public_path = temporary / f"public-{index}.der"
                  signature_path = temporary / f"signature-{index}"
                  key_path.write_bytes(PRIVATE_KEY_PREFIX + seeds[key_id])
                  key_path.chmod(0o600)
                  public_der = subprocess.run(
                      ["openssl", "pkey", "-inform", "DER", "-in", str(key_path),
                       "-pubout", "-outform", "DER"],
                      check=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE,
                  ).stdout
                  if not public_der.startswith(PUBLIC_KEY_PREFIX) or len(public_der) != 44:
                      raise SystemExit("OpenSSL returned a noncanonical Ed25519 public key")
                  if public_der[len(PUBLIC_KEY_PREFIX):] != trusted_bytes[key_id]:
                      raise SystemExit(f"signing seed and trusted public key differ for {key_id!r}")
                  public_path.write_bytes(public_der)
                  subprocess.run(
                      ["openssl", "pkeyutl", "-sign", "-inkey", str(key_path),
                       "-keyform", "DER", "-rawin", "-in", str(manifest_path),
                       "-out", str(signature_path)],
                      check=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE,
                  )
                  signature = signature_path.read_bytes()
                  if len(signature) != 64:
                      raise SystemExit("OpenSSL returned a noncanonical Ed25519 signature")
                  subprocess.run(
                      ["openssl", "pkeyutl", "-verify", "-pubin", "-inkey", str(public_path),
                       "-keyform", "DER", "-rawin", "-in", str(manifest_path),
                       "-sigfile", str(signature_path)],
                      check=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE,
                  )
                  signatures.append({
                      "key_id": key_id,
                      "signature": base64.b64encode(signature).decode(),
                  })

          signature_document = {"schema_version": 1, "signatures": signatures}
          (assets / "nrm-agent-manifest-v1.json.sig").write_bytes(
              json.dumps(signature_document, separators=(",", ":")).encode() + b"\n"
          )
          (output / "trusted-public-keys.json").write_bytes(
              json.dumps({key: trusted[key] for key in sorted(trusted)}, separators=(",", ":")).encode() + b"\n"
          )
          print(f"assembled six artifacts and {len(signatures)} detached signature(s)")
          PY

      - name: Upload signed release candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: signed-agent-release-${{ needs.prepare.outputs.source_commit }}
          path: release-candidate
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: true

  publish:
    name: Verify and publish immutable release
    needs: [prepare, sign]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write # Create, populate, and publish the GitHub Release.
      id-token: write # Mint the Sigstore certificate for release metadata.
      attestations: write # Persist manifest and signature attestations.
      artifact-metadata: write # Record the attested manifest and signature metadata.
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
      PROTOCOL_VERSION: ${{ needs.prepare.outputs.protocol_version }}
      SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
      PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.prepare.outputs.source_commit }}

      - name: Install the checksum-pinned GitHub CLI
        shell: bash
        run: |
          set -euo pipefail
          archive="gh_${GH_CLI_VERSION}_linux_amd64.tar.gz"
          path="$RUNNER_TEMP/$archive"
          curl --fail --location --proto '=https' --proto-redir '=https' --tlsv1.2 \
            --retry 3 --retry-all-errors \
            "https://github.com/cli/cli/releases/download/v$GH_CLI_VERSION/$archive" \
            --output "$path"
          printf '%s  %s\n' "$GH_CLI_LINUX_AMD64_SHA256" "$path" \
            | sha256sum --check --strict
          tar -xzf "$path" -C "$RUNNER_TEMP"
          gh_dir="$RUNNER_TEMP/gh_${GH_CLI_VERSION}_linux_amd64/bin"
          [[ "$("$gh_dir/gh" version | sed -nE '1s/^gh version ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p')" == "$GH_CLI_VERSION" ]]
          echo "$gh_dir" >> "$GITHUB_PATH"

      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Test and build release verifier
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p nrm-registry --bin nrm-registry-release --locked
          cargo build -p nrm-registry --bin nrm-registry-release --release --locked

      - name: Download the signed release candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: signed-agent-release-${{ needs.prepare.outputs.source_commit }}
          path: signed-candidate

      - name: Strictly verify the isolated signer output
        shell: bash
        run: |
          set -euo pipefail
          cp -R signed-candidate/release-assets release-assets
          mkdir release-input
          {
            printf '%s\n' \
              "nrm-agent-$VERSION-aarch64-apple-darwin" \
              "nrm-agent-$VERSION-aarch64-pc-windows-msvc.exe" \
              "nrm-agent-$VERSION-aarch64-unknown-linux-musl" \
              "nrm-agent-$VERSION-x86_64-apple-darwin" \
              "nrm-agent-$VERSION-x86_64-pc-windows-msvc.exe" \
              "nrm-agent-$VERSION-x86_64-unknown-linux-musl"
          } | LC_ALL=C sort > expected-artifacts.txt
          {
            cat expected-artifacts.txt
            printf '%s\n' nrm-agent-manifest-v1.json nrm-agent-manifest-v1.json.sig
          } | LC_ALL=C sort > expected-assets.txt
          find release-assets -mindepth 1 -maxdepth 1 -printf '%f\n' \
            | LC_ALL=C sort > actual-assets.txt
          diff -u expected-assets.txt actual-assets.txt
          while IFS= read -r artifact; do
            path="release-assets/$artifact"
            if [[ ! -f "$path" || -L "$path" ]]; then
              echo "signed candidate entry is not a regular file: $artifact" >&2
              exit 1
            fi
            cp -- "$path" "release-input/$artifact"
          done < expected-artifacts.txt

          target/release/nrm-registry-release verify \
            --manifest release-assets/nrm-agent-manifest-v1.json \
            --signatures release-assets/nrm-agent-manifest-v1.json.sig \
            --artifacts-dir release-input \
            --trusted-public-keys signed-candidate/trusted-public-keys.json \
            --expected-version "$VERSION" \
            --expected-protocol-version "$PROTOCOL_VERSION" \
            --expected-source-commit "$SOURCE_COMMIT"

      - name: Attest manifest and detached signatures
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            release-assets/nrm-agent-manifest-v1.json
            release-assets/nrm-agent-manifest-v1.json.sig

      - name: Create draft release
        id: draft
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          resolve_remote_tag_commit() {
            local response object_type object_sha depth
            response="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG")"
            object_type="$(jq -er '.object.type' <<< "$response")"
            object_sha="$(jq -er '.object.sha' <<< "$response")"
            for ((depth = 0; depth <= 8; depth++)); do
              if [[ "$object_type" == commit ]]; then
                if [[ ! "$object_sha" =~ ^[0-9a-f]{40}$ ]]; then
                  echo "remote tag resolved to an invalid commit ID" >&2
                  return 1
                fi
                printf '%s\n' "$object_sha"
                return 0
              fi
              if [[ "$object_type" != tag || ! "$object_sha" =~ ^[0-9a-f]{40}$ ]]; then
                echo "remote tag points to unsupported object type: $object_type" >&2
                return 1
              fi
              if ((depth == 8)); then
                break
              fi
              response="$(gh api \
                --header 'Accept: application/vnd.github+json' \
                --header 'X-GitHub-Api-Version: 2026-03-10' \
                "repos/$GITHUB_REPOSITORY/git/tags/$object_sha")"
              object_type="$(jq -er '.object.type' <<< "$response")"
              object_sha="$(jq -er '.object.sha' <<< "$response")"
            done
            echo "remote tag annotation nesting exceeds eight objects" >&2
            return 1
          }
          remote_tag_commit="$(resolve_remote_tag_commit)"
          if [[ "$remote_tag_commit" != "$SOURCE_COMMIT" ]]; then
            echo "$RELEASE_TAG moved after release preparation" >&2
            exit 1
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "a release already exists for $RELEASE_TAG; refusing to replace it" >&2
            exit 1
          fi

          release_body=$'> [!WARNING]\n> **Work in progress.** This release is public for cross-platform testing and may change incompatibly.'
          draft_json="$(
            jq -nc \
              --arg tag "$RELEASE_TAG" \
              --arg source "$SOURCE_COMMIT" \
              --arg body "$release_body" \
              --argjson prerelease "$PRERELEASE" \
              '{
                tag_name: $tag,
                target_commitish: $source,
                name: $tag,
                body: $body,
                draft: true,
                prerelease: $prerelease,
                generate_release_notes: true
              }' \
            | gh api --method POST \
                --header 'Accept: application/vnd.github+json' \
                --header 'X-GitHub-Api-Version: 2026-03-10' \
                "repos/$GITHUB_REPOSITORY/releases" --input -
          )"
          draft_id="$(jq -er '.id | select(type == "number" and . > 0)' <<< "$draft_json")"
          cleanup_incomplete_draft_create() {
            local status=$?
            local release_json
            trap - EXIT
            if [[ "$status" -eq 0 ]]; then
              return 0
            fi
            echo "draft creation did not complete; checking exact release $draft_id for cleanup" >&2
            if ! release_json="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/$GITHUB_REPOSITORY/releases/$draft_id")"; then
              echo "could not retrieve the incomplete draft; inspect release ID $draft_id manually" >&2
              return "$status"
            fi
            if ! jq -e --arg tag "$RELEASE_TAG" --argjson id "$draft_id" \
              '.id == $id
                and .tag_name == $tag
                and .draft == true
                and .immutable == false
                and .published_at == null' \
              <<< "$release_json" >/dev/null; then
              echo "refusing to delete release $draft_id because its identity or state changed" >&2
              return "$status"
            fi
            if ! gh api --method DELETE \
              "repos/$GITHUB_REPOSITORY/releases/$draft_id"; then
              echo "could not delete incomplete draft $draft_id; inspect it manually" >&2
            fi
            return "$status"
          }
          trap cleanup_incomplete_draft_create EXIT
          jq -e \
            --arg tag "$RELEASE_TAG" \
            --arg warning '**Work in progress.**' \
            --argjson prerelease "$PRERELEASE" \
            '.id > 0
              and .tag_name == $tag
              and .name == $tag
              and (.body | contains($warning))
              and .draft == true
              and .prerelease == $prerelease
              and .immutable == false
              and .published_at == null
              and (.assets | length) == 0' \
            <<< "$draft_json" >/dev/null
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "id=$draft_id" >> "$GITHUB_OUTPUT"
          trap - EXIT

      - name: Populate draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f -print | LC_ALL=C sort)
          if [[ "${#assets[@]}" -ne 8 ]]; then
            echo "expected exactly eight release assets, found ${#assets[@]}" >&2
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${assets[@]}"

      - name: Re-download and verify complete draft
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tool=target/release/nrm-registry-release
          mkdir -p downloaded downloaded-artifacts

          release_json="$(gh release view "$RELEASE_TAG" \
            --json tagName,isDraft,isImmutable,assets)"
          jq -e \
            --arg tag "$RELEASE_TAG" \
            '.tagName == $tag and .isDraft == true and .isImmutable == false' \
            <<< "$release_json" >/dev/null

          {
            printf '%s\n' \
              "nrm-agent-$VERSION-aarch64-apple-darwin" \
              "nrm-agent-$VERSION-aarch64-pc-windows-msvc.exe" \
              "nrm-agent-$VERSION-aarch64-unknown-linux-musl" \
              "nrm-agent-$VERSION-x86_64-apple-darwin" \
              "nrm-agent-$VERSION-x86_64-pc-windows-msvc.exe" \
              "nrm-agent-$VERSION-x86_64-unknown-linux-musl" \
              nrm-agent-manifest-v1.json \
              nrm-agent-manifest-v1.json.sig
          } | LC_ALL=C sort > expected-assets.txt
          jq -r '.assets[].name' <<< "$release_json" | LC_ALL=C sort > draft-assets.txt
          diff -u expected-assets.txt draft-assets.txt

          gh release download "$RELEASE_TAG" --dir downloaded
          find downloaded -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort \
            > downloaded-assets.txt
          diff -u expected-assets.txt downloaded-assets.txt

          while IFS= read -r asset; do
            cmp "release-assets/$asset" "downloaded/$asset"
          done < expected-assets.txt
          find downloaded -maxdepth 1 -type f -name 'nrm-agent-*' \
            ! -name 'nrm-agent-manifest-v1.json*' \
            -exec cp '{}' downloaded-artifacts/ \;

          "$tool" verify \
            --manifest downloaded/nrm-agent-manifest-v1.json \
            --signatures downloaded/nrm-agent-manifest-v1.json.sig \
            --artifacts-dir downloaded-artifacts \
            --trusted-public-keys signed-candidate/trusted-public-keys.json \
            --expected-version "$VERSION" \
            --expected-protocol-version "$PROTOCOL_VERSION" \
            --expected-source-commit "$SOURCE_COMMIT"

      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          resolve_remote_tag_commit() {
            local response object_type object_sha depth
            response="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG")"
            object_type="$(jq -er '.object.type' <<< "$response")"
            object_sha="$(jq -er '.object.sha' <<< "$response")"
            for ((depth = 0; depth <= 8; depth++)); do
              if [[ "$object_type" == commit ]]; then
                if [[ ! "$object_sha" =~ ^[0-9a-f]{40}$ ]]; then
                  echo "remote tag resolved to an invalid commit ID" >&2
                  return 1
                fi
                printf '%s\n' "$object_sha"
                return 0
              fi
              if [[ "$object_type" != tag || ! "$object_sha" =~ ^[0-9a-f]{40}$ ]]; then
                echo "remote tag points to unsupported object type: $object_type" >&2
                return 1
              fi
              if ((depth == 8)); then
                break
              fi
              response="$(gh api \
                --header 'Accept: application/vnd.github+json' \
                --header 'X-GitHub-Api-Version: 2026-03-10' \
                "repos/$GITHUB_REPOSITORY/git/tags/$object_sha")"
              object_type="$(jq -er '.object.type' <<< "$response")"
              object_sha="$(jq -er '.object.sha' <<< "$response")"
            done
            echo "remote tag annotation nesting exceeds eight objects" >&2
            return 1
          }
          remote_tag_commit="$(resolve_remote_tag_commit)"
          if [[ "$remote_tag_commit" != "$SOURCE_COMMIT" ]]; then
            echo "$RELEASE_TAG moved while the release was a draft" >&2
            exit 1
          fi
          publish_flags=(--draft=false --tag "$RELEASE_TAG" --verify-tag)
          if [[ "$PRERELEASE" == true ]]; then
            publish_flags+=(--prerelease --latest=false)
          else
            publish_flags+=(--latest)
          fi
          gh release edit "$RELEASE_TAG" "${publish_flags[@]}"

          verified=false
          for attempt in {1..60}; do
            if release_json="$(gh release view "$RELEASE_TAG" \
              --json tagName,isDraft,isImmutable)" \
              && jq -e \
                --arg tag "$RELEASE_TAG" \
                '.tagName == $tag and .isDraft == false and .isImmutable == true' \
                <<< "$release_json" >/dev/null \
              && gh release verify "$RELEASE_TAG"; then
              verified=true
              break
            fi
            if [[ "$attempt" -lt 60 ]]; then
              sleep 5
            fi
          done
          if [[ "$verified" != true ]]; then
            release_json="$(gh release view "$RELEASE_TAG" --json tagName,isDraft,isImmutable)"
            if jq -e --arg tag "$RELEASE_TAG" \
              '.tagName == $tag and .isDraft == false and .isImmutable == true' \
              <<< "$release_json" >/dev/null; then
              echo "release is published and immutable, but attestation verification did not converge after five minutes; do not rerun or replace it" >&2
            else
              echo "published release did not become immutable with a valid release attestation" >&2
            fi
            exit 1
          fi

          remote_tag_commit="$(resolve_remote_tag_commit)"
          if [[ "$remote_tag_commit" != "$SOURCE_COMMIT" ]]; then
            echo "immutable release tag does not match the signed source commit" >&2
            exit 1
          fi

      - name: Remove this run's failed draft
        if: ${{ failure() && steps.draft.outputs.created == 'true' && steps.draft.outputs.id != '' }}
        env:
          EXPECTED_RELEASE_ID: ${{ steps.draft.outputs.id }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release_json="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/releases/$EXPECTED_RELEASE_ID")"
          jq -e --arg tag "$RELEASE_TAG" --argjson id "$EXPECTED_RELEASE_ID" \
            '.id == $id
              and .tag_name == $tag
              and .draft == true
              and .immutable == false
              and .published_at == null' \
            <<< "$release_json" >/dev/null
          gh api --method DELETE \
            "repos/$GITHUB_REPOSITORY/releases/$EXPECTED_RELEASE_ID"
