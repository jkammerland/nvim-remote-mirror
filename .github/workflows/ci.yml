name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_AUDIT_VERSION: "0.22.1"
  SELENE_VERSION: "0.31.0"
  SHELLCHECK_SHA256: "6c881ab0698e4e6ea235245f22832860544f17ba386442fe7e9d629f8cbedf87"
  SHELLCHECK_VERSION: "0.10.0"
  STYLUA_VERSION: "2.5.2"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, 2026-06-30
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Neovim and Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 neovim
      - name: Install ShellCheck
        run: |
          curl --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output /tmp/shellcheck.tar.xz \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          printf '%s  %s\n' "${SHELLCHECK_SHA256}" /tmp/shellcheck.tar.xz | sha256sum --check --strict
          tar -C /tmp -xf /tmp/shellcheck.tar.xz
          sudo install -m 0755 "/tmp/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version
      - name: Install Lua lint tools
        run: |
          cargo install stylua --version "${STYLUA_VERSION}" --locked
          cargo install selene --version "${SELENE_VERSION}" --locked
      - name: Check Neovim version
        run: nvim --headless --clean +'lua local v = vim.version(); if v.major == 0 and v.minor < 10 then error(string.format("nvim-remote-mirror requires Neovim 0.10+, got %d.%d.%d", v.major, v.minor, v.patch or 0)) end; if vim.fn.exists("*readblob") ~= 1 then error("nvim-remote-mirror requires readblob()") end' +qa
      - name: Rust format
        run: cargo fmt --all --check
      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings -D clippy::undocumented_unsafe_blocks
      - name: Rust tests
        run: cargo test --workspace --locked
      - name: Lua syntax
        run: git ls-files -z '*.lua' | xargs -0 luac5.1 -p
      - name: Lua format
        run: stylua --check lua plugin tests
      - name: Lua lint
        run: selene lua plugin tests
      - name: Headless Neovim tests
        run: find tests -maxdepth 1 -name '*.lua' -print0 | sort -z | while IFS= read -r -d '' test; do nvim --headless -u NONE -l "$test"; done
      - name: Shell syntax
        run: bash -n scripts/*.sh
      - name: Shell lint
        run: shellcheck scripts/*.sh
      - name: Dependency audit
        run: |
          cargo install cargo-audit --version "${CARGO_AUDIT_VERSION}" --locked
          cargo audit -f Cargo.lock -D warnings
      - name: Whitespace
        run: git diff --check
      - name: Perf smoke
        run: scripts/perf_smoke.sh --small
