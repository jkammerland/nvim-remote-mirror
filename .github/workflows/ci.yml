name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Neovim and Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 neovim
      - name: Check Neovim version
        run: nvim --headless --clean +'lua local v = vim.version(); if v.major == 0 and v.minor < 10 then error(string.format("nvim-remote-mirror requires Neovim 0.10+, got %d.%d.%d", v.major, v.minor, v.patch or 0)) end; if vim.fn.exists("*readblob") ~= 1 then error("nvim-remote-mirror requires readblob()") end' +qa
      - name: Rust format
        run: cargo fmt --all --check
      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings -D clippy::undocumented_unsafe_blocks
      - name: Rust tests
        run: cargo test --workspace --locked
      - name: Lua syntax
        run: git ls-files -z '*.lua' | xargs -0 luac5.1 -p
      - name: Headless Neovim tests
        run: find tests -maxdepth 1 -name '*.lua' -print0 | sort -z | while IFS= read -r -d '' test; do nvim --headless -u NONE -l "$test"; done
      - name: Shell syntax
        run: bash -n scripts/*.sh
      - name: Whitespace
        run: git diff --check
      - name: Perf smoke
        run: scripts/perf_smoke.sh --small
